<html>
<head>
  <script src="//d2wy8f7a9ursnm.cloudfront.net/v5/bugsnag.min.js"></script>
  <script>window.bugsnagClient = bugsnag('e68a9c7e8df6ed36d155702829ec5705')</script>

  <title>WUCT Breaking Bonds Round</title>
  <script src="https://www.gstatic.com/firebasejs/6.2.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/6.2.0/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/6.2.0/firebase-database.js"></script>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.3.1/jquery.min.js" integrity="sha256-FgpCb/KJQlLNfOu91ta32o/NMZxltwRo8QtmkMRdAu8=" crossorigin="anonymous"></script>
  <script src="common.min.js?1775425025820"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/twitter-bootstrap/4.3.1/css/bootstrap.min.css" integrity="sha256-YLGeXaapI0/5IgZopewRJcFXomhRMlYYjugPLSyNjTY=" crossorigin="anonymous" />
  <link rel="stylesheet" href="main.css?1775425025820" />
</head>
<body>
  <header>
    <h1><img src="wuct.png" alt="WUCT" />Breaking Bonds Round</h1>
    <a id="teamname" href="/compete.html">compete</a>
    <a href="/index.html">scoreboard</a>
    <a href="/archive.html">archive</a>
  </header>
  
  <h1><img src="wuct_bw.png" alt="WUCT" /></h1>
  
  <div id="timer"></div>
  
  
  <!--span id="login-status"></span-->
  <div style="position:relative;">
    <div id="app" style="position: absolute;">
      <div id="division-header" style="z-index: 9999; cursor: pointer;">
        <u id="division-title"></u>
        <span>
          <button id="switch-division" style="display: none;">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="cursor:pointer; color: #255d38;">
              <path d="M7 6c2-1.5 4.5-2 7-1.5 2.5.5 4.5 2 6 4" />
              <path d="M20 5v5h-5" />
              <path d="M17 18c-2 1.5-4.5 2-7 1.5-2.5-.5-4.5-2-6-4" />
              <path d="M4 19v-5h5" />
            </svg>
          </button>
        </span>
      </div>
      <div id="division-list"></div>
    </div>
    <div id="hidden" style="position: absolute; margin-top: 1em;">Scores hidden for awards ceremony suspense :)</div>
  </div>
  <style>
    body{
      text-align: center;
      overflow-x: hidden;
    }
    body>h1 img{
      height: 1.6em;
      vertical-align: -0.143em;
    }
    #app{
      padding: 2em;
      opacity: 0;
      transition: opacity 1s;
      width: 100%;
      left: 50%;
      margin-left: -50%;
    }
    #app ol{
      text-align: left;
      display: inline-block;
      padding: 0;
      list-style-type: none;
    }
    @media(min-width: 1000px){
      #app ol{
        -webkit-column-count: 3; /* Chrome, Safari, Opera */
        -moz-column-count: 3; /* Firefox */
        column-count: 3;
        width: 60em;
        font-size: 1.2em;
      }
    }
    @media(max-width: 1000px){
      #app ol{
        width: 100%;
        font-size: 2em;
      }
    }
    #app ol li{
      position: relative;
      width: 100%;
    }
    #app ol li span.progress{
      height: 0.15em;
      position: absolute;
      bottom: 0;
      margin: 0;
    }
    #app ol li span.progress.easy{
      background: #0f0;
      left: 0%;
    }
    #app ol li span.progress.medium{
      background: #09f;
      left: 33%;
    }
    #app ol li span.progress.hard{
      background: #f00;
      left: 67%;
    }
    #app ol li span{
      float: right;
    }
    #app ol li div{
      clear: both;
    }
    #app ol li:nth-child(odd){
      background-color: #ccc
    }
    #hidden{
      opacity: 0;
      transition: opacity 1s;
      width: 1000px;
      left: 50%;
      margin-left: -500px;
      font-size: 2em;
      pointer-events: none;
    }
    #timer{
      font-size: 4em;
      height: 1em;
    }
    svg:hover {
      transform: rotate(45deg);
      transition: transform 0.2s ease-in-out;
    }
    #division-title {
      color: #255d38;
    }
    #switch-division {
      aspect-ratio: 1;
      margin: 0.3em;
      padding: 0;
      border-radius: 20%;
    }
    #switch-division:hover {
      background-color: #9e9c9cff;
    }
  </style>
  
  <script>
    window.teamNames = {};
    window.scores = {};
    window.uniqueDivisions = [window.defaultDivision];
    window.currentDivision = getCurrentDivision();
    document.getElementById("switch-division").onclick = switchDivision;
    const trigger = document.getElementById("division-header");
    const switchBtn = document.getElementById("switch-division");
    trigger.addEventListener('mouseenter', () => {
      switchBtn.style.display = 'inline-block';
    });
    trigger.addEventListener('mouseleave', () => {
      switchBtn.style.display = 'none';
    });

    function getCurrentDivision() {
      const currentDivision = localStorage.getItem("currentDivision");
      if (currentDivision) {
        return currentDivision;
      }
      return window.uniqueDivisions[0];
    }

    function setCurrentDivision(currentDivision) {
      localStorage.setItem("currentDivision", currentDivision);
      window.currentDivision = currentDivision;
    }

    function switchDivision() {
      const currentDivision = getCurrentDivision();
      const uniqueDivisions = window.uniqueDivisions;
      const currentIndex = uniqueDivisions.indexOf(currentDivision);
      const nextIndex = (currentIndex + 1) % uniqueDivisions.length;
      setCurrentDivision(uniqueDivisions[nextIndex]);
      render();
    }

    function getUniqueDivisions() {
      window.uniqueDivisions = [];
      for (let teamId in window.teamNames) {
        if (window.teamNames[teamId].hasOwnProperty("division")) {
          if (!window.uniqueDivisions.includes(window.teamNames[teamId].division)) {
            window.uniqueDivisions.push(window.teamNames[teamId].division);
          }
        } else {
          if (!window.uniqueDivisions.includes(window.defaultDivision)) {
            window.uniqueDivisions.push(window.defaultDivision);
          }
        }
      }
      if (window.uniqueDivisions.length === 0) {
        window.uniqueDivisions = [window.defaultDivision];
      }
      if (!window.uniqueDivisions.includes(window.currentDivision)) {
        setCurrentDivision(window.uniqueDivisions[0]);
      }
    }
    
    fb.child('timer').once('value', function(snapshot){
      if(Math.floor((snapshot.val().target - (new Date()).getTime())/1000) < snapshot.val().hidetime * 60){
        document.getElementById("hidden").style.opacity = "1";
        return;
      }
      
      fb.child('teams').on('value', function(snapshot){
        window.teamNames = snapshot.val();
        getUniqueDivisions();
        render();
      });
      
      fb.child('scores').on('value', function(snapshot){
        getUniqueDivisions();
        window.scores = {};
        for (division of window.uniqueDivisions) {
          window.scores[division] = [];
        }
        var teams = snapshot.val();
        for(var teamId in teams){
          if(teams.hasOwnProperty(teamId)){
            var score = window.getScore(teams[teamId]);
            var progress = window.getProgress(teams[teamId]);
            var id = teamId.slice(4);
            if(window.teamNames[id] === undefined) {
              continue;
            }
            const division = window.teamNames[id].division ?? window.defaultDivision;
            window.scores[division].push({id: teamId, score: score, progress: progress});
          }
        }
        for (division of window.uniqueDivisions) {
          window.scores[division].sort(function(a,b){return b.score - a.score;});
        }
        render();
      });
    });
    function render(){
      const division = window.currentDivision;
      if (window.scores[division] == undefined) {
        return;
      }
      var s = "";
      var prevRank = 0;
      for(let i = 0; i < window.scores[division].length; i++){
        var id = scores[division][i].id.slice(4);
        if(window.teamNames[id] === undefined)
          continue;
        if(i > 0 && scores[division][i].score != scores[division][i-1].score)
          prevRank = i;
        
        s += "<li>" + (prevRank + 1) + ". " + window.teamNames[id].name + "<span>" + scores[division][i].score + "</span><div></div>"
        s += "<span class='progress easy' style='width:"+scores[division][i].progress[0]*33+"%'></span>"
        s += "<span class='progress medium' style='width:"+scores[division][i].progress[1]*34+"%'></span>"
        s += "<span class='progress hard' style='width:"+scores[division][i].progress[2]*33+"%'></span>"
        s += "</li>";
      }
      document.getElementById('division-title').innerHTML = "<h1>Division " + division + "</h1>";
      document.getElementById('division-list').innerHTML = "<ol>" + s + "</ol>";
    }
    var hidetime;
    fb.child('timer').child('hidetime').on('value', function(snapshot){hidetime = snapshot.val();});
    setTimer(document.getElementById("timer"), function(seconds){
      // Both cases, so that we stay up to date if hidetime changes.
      if(seconds <= 0)
        document.getElementById("timer").style.color = "red";
      else
        document.getElementById("timer").style.color = "black";
      if(seconds < hidetime * 60){
        document.getElementById('app').style.opacity = 0;
        document.getElementById('hidden').style.opacity = 1;
      }else{
        document.getElementById('app').style.opacity = 1;
        document.getElementById('hidden').style.opacity = 0;
      }
    });
  </script>
</body>
</html>
